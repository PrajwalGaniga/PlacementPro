<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alumni Login | PlacementPro AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            dark: '#0b0914',
                            card: 'rgba(30, 28, 46, 0.65)',
                            accent1: '#8b5cf6',
                            accent2: '#ec4899',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0b0914;
            overflow-x: hidden;
        }

        .glass {
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 md:p-8">
    
    <div class="blob bg-brand-accent1 -top-[10%] -left-[10%]"></div>
    <div class="blob bg-brand-accent2 -bottom-[10%] -right-[10%]"></div>

    <div class="w-full max-w-[440px] z-10 animate-fade-in">

        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 mb-4">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-brand-accent1 to-brand-accent2 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Alumni Portal</h1>
            <p class="text-slate-400 mt-2 text-sm sm:text-base">Reconnect with your alma mater & network</p>
        </div>

        <div class="glass bg-brand-card rounded-[2rem] p-6 sm:p-10">
            
            <div id="errorBanner" class="hidden mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-center gap-3">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span id="errorText"></span>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-widest">Work Email</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-500 group-focus-within:text-brand-accent1 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" /></svg>
                        </div>
                        <input id="email" type="email" required placeholder="alumnus@company.com"
                            class="w-full bg-black/30 border border-white/10 text-white rounded-xl pl-12 pr-4 py-3.5 text-sm focus:outline-none focus:border-brand-accent1 focus:ring-4 focus:ring-brand-accent1/10 transition-all placeholder:text-slate-600" />
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Password</label>
                        <a href="#" class="text-[11px] text-brand-accent1 hover:underline">Forgot?</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-500 group-focus-within:text-brand-accent1 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        </div>
                        <input id="password" type="password" required placeholder="••••••••"
                            class="w-full bg-black/30 border border-white/10 text-white rounded-xl pl-12 pr-12 py-3.5 text-sm focus:outline-none focus:border-brand-accent1 focus:ring-4 focus:ring-brand-accent1/10 transition-all placeholder:text-slate-600" />
                        <button type="button" onclick="togglePw()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors p-1">
                            <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="loginBtn"
                    class="w-full bg-gradient-to-r from-brand-accent1 to-brand-accent2 text-white font-bold py-4 rounded-xl text-sm shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40 hover:-translate-y-0.5 active:translate-y-0 transition-all flex items-center justify-center gap-2">
                    <span>Sign In to Dashboard</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-white/5 text-center">
                <div class="inline-block px-3 py-1.5 bg-white/5 border border-white/10 rounded-lg">
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Demo Access</p>
                    <code class="text-[11px] text-white">prajwal@google.com • 123456</code>
                </div>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-2 gap-4">
            <a href="/alumni/onboard" class="glass bg-white/5 hover:bg-white/10 p-4 rounded-2xl text-center transition-all group">
                <p class="text-xs text-slate-400 mb-1">New here?</p>
                <p class="text-sm font-semibold text-white group-hover:text-brand-accent1">Join Network</p>
            </a>
            <a href="/alumni/verification" class="glass bg-white/5 hover:bg-white/10 p-4 rounded-2xl text-center transition-all group">
                <p class="text-xs text-slate-400 mb-1">Applied?</p>
                <p class="text-sm font-semibold text-white group-hover:text-amber-400">Check Status</p>
            </a>
        </div>
    </div>

    <script>
        function togglePw() {
            const inp = document.getElementById('password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const banner = document.getElementById('errorBanner');
            const errText = document.getElementById('errorText');
            
            // Loading State
            btn.innerHTML = `<div class="spinner w-5 h-5"></div> <span>Verifying...</span>`;
            btn.disabled = true;
            banner.classList.add('hidden');

            try {
                const res = await fetch('/alumni/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                    }),
                    redirect: 'follow',
                });

                if (res.ok || res.redirected) {
                    window.location.href = res.url || '/alumni/dashboard';
                } else {
                    const err = await res.json().catch(() => ({}));
                    errText.textContent = err.detail || 'Access denied. Please check your credentials.';
                    banner.classList.remove('hidden');
                    btn.innerHTML = `<span>Sign In to Dashboard</span> <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>`;
                    btn.disabled = false;
                }
            } catch (error) {
                errText.textContent = 'Server connection failed. Try again later.';
                banner.classList.remove('hidden');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
